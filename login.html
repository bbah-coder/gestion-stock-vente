<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!--SERVICE PROGRESSIVE WEB APP (PWA)-->
  <meta name="theme-color" content="#22c55e">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/image/icon-192.png">
  
  <title>Connexion</title>

 <!-- CSS -->
  <link rel="stylesheet" href="css/login.css">

         <!--Supabase-->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  
</head>

<body>

<div class="login-page">

  <div class="login-box">

    <h1>🛍️ Boutique Manager</h1>
    <p class="subtitle">Connectez-vous à votre espace</p>

    <div class="input-group">
      <input type="text" id="username" placeholder="👤 Utilisateur">
    </div>

    <div class="input-group">
      <input type="password" id="password" placeholder="Mot de passe">
    </div>

    <button id="loginBtn">Se connecter</button>

    <div id="error" class="error"></div>

    <div class="info">
      <small>Admin : admin / 1234</small><br>
      <small>Vendeur : vendeur / 1234</small>
    </div>

  </div>

</div>

<script src="js/utils.js"></script>
<script src="js/login.js"></script>

</body>
</html>
